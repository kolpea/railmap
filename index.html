<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Railmap — Global Train Stations</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/map.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>
<body>

  <!-- Floating brand mark -->
  <div class="brand-float">
    <svg width="18" height="18" viewBox="0 0 20 20" fill="none" aria-hidden="true">
      <rect x="7" y="1" width="6" height="14" rx="3" stroke="currentColor" stroke-width="1.6"/>
      <path d="M4 15l2-2h8l2 2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      <line x1="7" y1="6" x2="13" y2="6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      <line x1="3" y1="18" x2="7" y2="15" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      <line x1="17" y1="18" x2="13" y2="15" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
    </svg>
    <span>Railmap</span>
  </div>

  <!-- Floating search bar, centered top -->
  <div class="search-float">
    <div class="search-wrap" id="search-wrap">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/>
        <line x1="11" y1="11" x2="14" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input
        type="text"
        placeholder="Search stations, cities…"
        id="station-search"
        autocomplete="off"
        spellcheck="false"
        aria-label="Search train stations"
        aria-autocomplete="list"
        aria-controls="search-results"
      >
      <div class="search-results" id="search-results" role="listbox"></div>
    </div>
  </div>

  <!-- OSM Map -->
  <div id="map"></div>

  <!-- Tooltip -->
  <div class="map-tooltip" id="map-tooltip" aria-live="polite"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/railmap-sbb.js"></script>
  <script src="js/stations-data.js"></script>
  <script src="js/map-render.js"></script>
</body>
</html>
